<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mfumo wa Uvuvi — Geofencing</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#0f172a;border-bottom:1px solid #1e293b;padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{font-size:15px;font-weight:700;color:#f1f5f9;display:flex;align-items:center;gap:8px}
.topbar-right{display:flex;align-items:center;gap:10px}
.live-pill{background:#16a34a;color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
.ldot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.5s infinite}
.conn-pill{display:flex;align-items:center;gap:6px;background:#1e293b;padding:4px 12px;border-radius:20px;font-size:12px}
.cdot{width:7px;height:7px;border-radius:50%;background:#ef4444}
.cdot.ok{background:#22c55e;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#1e293b;flex-shrink:0}
.stat{background:#0f172a;padding:10px 16px}
.stat-label{font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.stat-val{font-size:24px;font-weight:700;margin-top:2px}
.c-blue{color:#60a5fa}.c-green{color:#4ade80}.c-red{color:#f87171}.c-amber{color:#fbbf24}
.main{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden}
#map{height:100%}
.sidebar{background:#0f172a;border-left:1px solid #1e293b;display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:10px 14px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-head h3{font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.br{background:#450a0a;color:#f87171}.bg{background:#052e16;color:#4ade80}
#alerts{overflow-y:auto;max-height:180px;flex-shrink:0}
.alert-row{padding:8px 14px;border-bottom:1px solid #1e293b;display:flex;gap:8px;align-items:flex-start}
.ai{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ai-r{background:#450a0a}.ai-a{background:#451a03}.ai-g{background:#052e16}
.at{font-size:11px;font-weight:600;color:#e2e8f0}
.as{font-size:10px;color:#64748b;margin-top:1px}
#boats-list{overflow-y:auto;flex:1}
.boat-row{padding:10px 14px;border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s}
.boat-row:hover{background:#1e293b}
.bdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bs{background:#22c55e}.bw{background:#f59e0b;animation:blink 1s infinite}.bv{background:#ef4444;animation:blink .6s infinite}
.bi{flex:1}
.bid{font-size:13px;font-weight:700;color:#f1f5f9}
.bcoord{font-size:10px;color:#64748b;font-family:monospace;margin-top:1px}
.bstat{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.bss{background:#052e16;color:#4ade80}.bsw{background:#451a03;color:#fbbf24}.bsv{background:#450a0a;color:#f87171}
.no-data{padding:20px;text-align:center;color:#475569;font-size:12px}
.pbar{background:#0f172a;border-top:1px solid #1e293b;padding:6px 14px;font-size:10px;color:#475569;display:flex;justify-content:space-between;flex-shrink:0}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">⚓ Mfumo wa Udhibiti wa Uvuvi — Geofencing</div>
  <div class="topbar-right">
    <div class="conn-pill"><div class="cdot ok" id="cdot"></div><span id="clabel">Imeunganika</span></div>
    <div class="live-pill"><div class="ldot"></div>LIVE</div>
    <span style="font-size:12px;color:#64748b" id="clock"></span>
  </div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-label">Pakiti</div><div class="stat-val c-blue" id="s-packets">0</div></div>
  <div class="stat"><div class="stat-label">Salama</div><div class="stat-val c-green" id="s-safe">0</div></div>
  <div class="stat"><div class="stat-label">Ukiukaji</div><div class="stat-val c-red" id="s-viol">0</div></div>
  <div class="stat"><div class="stat-label">Onyo</div><div class="stat-val c-amber" id="s-warn">0</div></div>
</div>
<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sb-head"><h3>🔔 Arifa</h3><span class="badge br" id="abadge">0</span></div>
    <div id="alerts"><div class="no-data">Inasubiri data...</div></div>
    <div class="sb-head" style="border-top:1px solid #1e293b"><h3>🚤 Boti</h3><span class="badge bg" id="bbadge">0</span></div>
    <div id="boats-list"><div class="no-data">Hakuna boti bado...</div></div>
    <div class="pbar"><span>Pakiti: <b id="pc">0</b></span><span id="lu">Mwisho: —</span></div>
  </div>
</div>
<script>
// ── Ramani ──
const map = L.map('map').setView([-8.934, 33.421], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);

// Maeneo yaliyokatazwa
fetch('/api/zones').then(r=>r.json()).then(zones=>{
  zones.forEach(z=>{
    const b=z.bounds;
    const rect=L.rectangle([[b.latMin,b.lonMin],[b.latMax,b.lonMax]],
      {color:'#ef4444',weight:2,dashArray:'6 4',fillColor:'#ef4444',fillOpacity:.15}).addTo(map);
    rect.bindTooltip(`🚫 ${z.name}`,{permanent:true,direction:'center'});
  });
}).catch(()=>{});

// ── State ──
const boats={},markers={},alerts=[];
let packets=0,dangerCount=0;

function icon(status){
  const c=status==='violation'?'#ef4444':status==='warning'?'#f59e0b':'#22c55e';
  return L.divIcon({className:'',
    html:`<div style="width:30px;height:30px;border-radius:50%;background:${c};border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 0 2px ${c}">⚓</div>`,
    iconSize:[30,30],iconAnchor:[15,15]});
}

function updateBoat(b){
  boats[b.id]=b;
  packets=b.packet||packets+1;
  if(markers[b.id]){markers[b.id].setLatLng([b.lat,b.lon]);markers[b.id].setIcon(icon(b.status));}
  else{
    const m=L.marker([b.lat,b.lon],{icon:icon(b.status)}).addTo(map);
    m.bindPopup('');markers[b.id]=m;
    map.setView([b.lat,b.lon],15);
  }
  markers[b.id].getPopup().setContent(`
    <div style="font-family:monospace;font-size:12px;line-height:1.7">
    <b style="font-size:14px">${b.id}</b><br>
    Lat: <b>${b.lat.toFixed(6)}</b><br>
    Lon: <b>${b.lon.toFixed(6)}</b><br>
    <b style="color:${b.status==='violation'?'#dc2626':b.status==='warning'?'#d97706':'#16a34a'}">
      ${b.status==='violation'?'⛔ UKIUKAJI':b.status==='warning'?'⚠️ ONYO':'✅ SALAMA'}
    </b>${b.zone?`<br>📍 ${b.zone}`:''}
    <br><small>${new Date(b.time).toLocaleTimeString()}</small></div>`);
  render();
}

function addAlert(a){
  alerts.unshift(a);if(alerts.length>50)alerts.pop();
  if(a.level==='danger')dangerCount++;
  renderAlerts();
  document.getElementById('abadge').textContent=dangerCount;
  if(markers[a.boat?.id])markers[a.boat.id].openPopup();
}

function render(){
  const all=Object.values(boats);
  document.getElementById('s-packets').textContent=packets;
  document.getElementById('s-safe').textContent=all.filter(b=>b.status==='safe').length;
  document.getElementById('s-viol').textContent=all.filter(b=>b.status==='violation').length;
  document.getElementById('s-warn').textContent=all.filter(b=>b.status==='warning').length;
  document.getElementById('bbadge').textContent=all.length;
  document.getElementById('pc').textContent=packets;
  document.getElementById('lu').textContent='Mwisho: '+new Date().toLocaleTimeString();
  const bl=document.getElementById('boats-list');
  if(!all.length){bl.innerHTML='<div class="no-data">Inasubiri data...</div>';return;}
  bl.innerHTML=all.map(b=>`
    <div class="boat-row" onclick="focusBoat('${b.id}')">
      <div class="bdot ${b.status==='safe'?'bs':b.status==='warning'?'bw':'bv'}"></div>
      <div class="bi"><div class="bid">${b.id}</div>
      <div class="bcoord">${b.lat.toFixed(5)}, ${b.lon.toFixed(5)}</div></div>
      <span class="bstat ${b.status==='safe'?'bss':b.status==='warning'?'bsw':'bsv'}">
        ${b.status==='safe'?'Salama':b.status==='warning'?'Onyo':'Ukiukaji'}</span>
    </div>`).join('');
}

function renderAlerts(){
  const el=document.getElementById('alerts');
  if(!alerts.length){el.innerHTML='<div class="no-data">Hakuna arifa bado...</div>';return;}
  el.innerHTML=alerts.slice(0,15).map(a=>`
    <div class="alert-row">
      <div class="ai ${a.level==='danger'?'ai-r':a.level==='warning'?'ai-a':'ai-g'}">
        ${a.level==='danger'?'🚨':a.level==='warning'?'⚠️':'✅'}</div>
      <div><div class="at">${a.message}</div>
      <div class="as">${new Date(a.time).toLocaleTimeString()}</div></div>
    </div>`).join('');
}

function focusBoat(id){
  const b=boats[id];
  if(b&&markers[id]){map.setView([b.lat,b.lon],16);markers[id].openPopup();}
}

setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString();},1000);

// ── Polling kila sekunde 2 (rahisi na ya kuaminika) ──
async function poll(){
  try{
    const [boatsRes,alertsRes]=await Promise.all([fetch('/api/boats'),fetch('/api/alerts')]);
    const boatsData=await boatsRes.json();
    const alertsData=await alertsRes.json();
    boatsData.forEach(updateBoat);
    // Ongeza arifa mpya tu
    alertsData.forEach(a=>{
      if(!alerts.find(x=>x.time===a.time))addAlert(a);
    });
    document.getElementById('cdot').classList.add('ok');
    document.getElementById('clabel').textContent='Imeunganika ✅';
  }catch(e){
    document.getElementById('cdot').classList.remove('ok');
    document.getElementById('clabel').textContent='Inaunganika...';
  }
}

// Anza polling mara moja kisha kila sekunde 2
poll();
setInterval(poll,2000);
</script>
</body>
</html>
