<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mfumo wa Uvuvi — Geofencing</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;height:100vh;display:flex;flex-direction:column}
.topbar{background:#0f172a;border-bottom:1px solid #1e293b;padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;color:#f1f5f9}
.topbar-right{display:flex;align-items:center;gap:12px}
.serial-status{display:flex;align-items:center;gap:6px;background:#1e293b;padding:4px 12px;border-radius:20px;font-size:12px}
.sdot{width:8px;height:8px;border-radius:50%;background:#ef4444}
.sdot.ok{background:#22c55e;animation:pulse 2s infinite}
.live-pill{background:#16a34a;color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px}
.ldot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#1e293b;flex-shrink:0}
.stat{background:#0f172a;padding:10px 16px}
.stat-label{font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.stat-val{font-size:24px;font-weight:700;margin-top:2px}
.stat-sub{font-size:10px;color:#475569;margin-top:1px}
.c-blue{color:#60a5fa}.c-green{color:#4ade80}.c-red{color:#f87171}.c-amber{color:#fbbf24}
.main{flex:1;display:grid;grid-template-columns:1fr 300px;overflow:hidden}
#map{height:100%}
.sidebar{background:#0f172a;border-left:1px solid #1e293b;display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:10px 14px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between;background:#0f172a;flex-shrink:0}
.sb-head h3{font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.br{background:#450a0a;color:#f87171}.bg{background:#052e16;color:#4ade80}.ba{background:#451a03;color:#fbbf24}
#alerts{overflow-y:auto;max-height:200px;flex-shrink:0}
.alert-row{padding:8px 14px;border-bottom:1px solid #1e293b;display:flex;gap:8px;align-items:flex-start}
.ai{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ai-r{background:#450a0a}.ai-a{background:#451a03}.ai-g{background:#052e16}
.at{font-size:11px;font-weight:600;color:#e2e8f0}
.as{font-size:10px;color:#64748b;margin-top:1px}
.divider{height:1px;background:#1e293b;flex-shrink:0}
#boats-list{overflow-y:auto;flex:1}
.boat-row{padding:10px 14px;border-bottom:1px solid #1e293b;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s}
.boat-row:hover{background:#1e293b}
.bdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.bs{background:#22c55e}.bw{background:#f59e0b;animation:pulse 1s infinite}.bv{background:#ef4444;animation:pulse .6s infinite}
.bi{flex:1}
.bid{font-size:13px;font-weight:700;color:#f1f5f9}
.bcoord{font-size:10px;color:#64748b;font-family:monospace;margin-top:1px}
.bstat{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.bss{background:#052e16;color:#4ade80}.bsw{background:#451a03;color:#fbbf24}.bsv{background:#450a0a;color:#f87171}
.no-data{padding:20px;text-align:center;color:#475569;font-size:12px}
.packet-bar{background:#0f172a;border-top:1px solid #1e293b;padding:8px 14px;font-size:10px;color:#475569;display:flex;justify-content:space-between;flex-shrink:0}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">⚓ Mfumo wa Udhibiti wa Uvuvi — Geofencing</div>
  <div class="topbar-right">
    <div class="serial-status">
      <div class="sdot" id="sdot"></div>
      <span id="slabel">Inasubiri COM15...</span>
    </div>
    <div class="live-pill"><div class="ldot"></div>LIVE</div>
    <span style="font-size:12px;color:#64748b" id="clock"></span>
  </div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Pakiti zilizopokelewa</div>
    <div class="stat-val c-blue" id="s-packets">0</div>
    <div class="stat-sub">Kutoka LoRa receiver</div>
  </div>
  <div class="stat">
    <div class="stat-label">Salama</div>
    <div class="stat-val c-green" id="s-safe">0</div>
    <div class="stat-sub">Nje ya mipaka</div>
  </div>
  <div class="stat">
    <div class="stat-label">Ukiukaji</div>
    <div class="stat-val c-red" id="s-viol">0</div>
    <div class="stat-sub">Ndani ya eneo</div>
  </div>
  <div class="stat">
    <div class="stat-label">Onyo</div>
    <div class="stat-val c-amber" id="s-warn">0</div>
    <div class="stat-sub">Inakaribia mpaka</div>
  </div>
</div>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sb-head">
      <h3>🔔 Arifa</h3>
      <span class="badge br" id="alert-badge">0</span>
    </div>
    <div id="alerts">
      <div class="no-data">Inasubiri data kutoka Arduino...</div>
    </div>
    <div class="divider"></div>
    <div class="sb-head">
      <h3>🚤 Boti</h3>
      <span class="badge bg" id="boat-count">0</span>
    </div>
    <div id="boats-list">
      <div class="no-data">Hakuna boti zimegunduliwa bado...</div>
    </div>
    <div class="packet-bar">
      <span>Pakiti: <strong id="pcount">0</strong></span>
      <span id="last-packet">Mwisho: —</span>
    </div>
  </div>
</div>

<script>
// ── Ramani ──
// Kuratibu zinaelekea eneo lako halisi (karibu na -8.935, 33.422)
const map = L.map('map').setView([-8.936, 33.423], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap', maxZoom:19
}).addTo(map);

// Maeneo yaliyokatazwa — yanatoka kwenye seva
let zoneLayers = [];
fetch('/api/zones').then(r=>r.json()).then(zones=>{
  zones.forEach(z=>{
    const b = z.bounds;
    const rect = L.rectangle(
      [[b.latMin, b.lonMin],[b.latMax, b.lonMax]],
      {color:'#ef4444',weight:2,dashArray:'6 4',fillColor:'#ef4444',fillOpacity:.15}
    ).addTo(map);
    rect.bindTooltip(`🚫 ${z.name}`,{permanent:true,direction:'center',className:'zone-tip'});
    zoneLayers.push(rect);
  });
});

// ── State ──
const boats = {};
const boatMarkers = {};
const alerts = [];
let packets = 0;
let dangerCount = 0;

function makeIcon(status){
  const c = status==='violation'?'#ef4444':status==='warning'?'#f59e0b':'#22c55e';
  return L.divIcon({
    className:'',
    html:`<div style="width:30px;height:30px;border-radius:50%;background:${c};border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 0 2px ${c}">⚓</div>`,
    iconSize:[30,30],iconAnchor:[15,15]
  });
}

function updateBoat(boat){
  boats[boat.id] = boat;
  if(boatMarkers[boat.id]){
    boatMarkers[boat.id].setLatLng([boat.lat,boat.lon]);
    boatMarkers[boat.id].setIcon(makeIcon(boat.status));
  } else {
    const m = L.marker([boat.lat,boat.lon],{icon:makeIcon(boat.status)}).addTo(map);
    m.bindPopup('');
    boatMarkers[boat.id] = m;
    map.setView([boat.lat,boat.lon],15);
  }
  boatMarkers[boat.id].getPopup().setContent(`
    <div style="font-family:monospace;font-size:12px;line-height:1.6">
    <b style="font-size:14px">${boat.id}</b><br>
    Lat: <b>${boat.lat.toFixed(6)}</b><br>
    Lon: <b>${boat.lon.toFixed(6)}</b><br>
    Hali: <b style="color:${boat.status==='violation'?'#dc2626':boat.status==='warning'?'#d97706':'#16a34a'}">
      ${boat.status==='violation'?'⛔ UKIUKAJI':boat.status==='warning'?'⚠️ ONYO':'✅ SALAMA'}
    </b>
    ${boat.zone?`<br>📍 ${boat.zone}`:''}
    <br><small>${new Date(boat.time).toLocaleTimeString()}</small>
    </div>
  `);
  packets = boat.packet || packets + 1;
  renderAll();
}

function addAlert(a){
  alerts.unshift(a);
  if(alerts.length>50) alerts.pop();
  if(a.level==='danger') dangerCount++;
  renderAlerts();
  document.getElementById('alert-badge').textContent = dangerCount;
}

function renderAll(){
  const all = Object.values(boats);
  document.getElementById('s-packets').textContent = packets;
  document.getElementById('s-safe').textContent = all.filter(b=>b.status==='safe').length;
  document.getElementById('s-viol').textContent = all.filter(b=>b.status==='violation').length;
  document.getElementById('s-warn').textContent = all.filter(b=>b.status==='warning').length;
  document.getElementById('boat-count').textContent = all.length;
  document.getElementById('pcount').textContent = packets;
  document.getElementById('last-packet').textContent = 'Mwisho: '+new Date().toLocaleTimeString();

  const bl = document.getElementById('boats-list');
  if(!all.length){bl.innerHTML='<div class="no-data">Inasubiri data...</div>';return;}
  bl.innerHTML = all.map(b=>`
    <div class="boat-row" onclick="focus('${b.id}')">
      <div class="bdot ${b.status==='safe'?'bs':b.status==='warning'?'bw':'bv'}"></div>
      <div class="bi">
        <div class="bid">${b.id}</div>
        <div class="bcoord">${b.lat.toFixed(5)}, ${b.lon.toFixed(5)}</div>
      </div>
      <span class="bstat ${b.status==='safe'?'bss':b.status==='warning'?'bsw':'bsv'}">
        ${b.status==='safe'?'Salama':b.status==='warning'?'Onyo':'Ukiukaji'}
      </span>
    </div>
  `).join('');
}

function renderAlerts(){
  const el = document.getElementById('alerts');
  if(!alerts.length){el.innerHTML='<div class="no-data">Hakuna arifa bado...</div>';return;}
  el.innerHTML = alerts.slice(0,20).map(a=>`
    <div class="alert-row">
      <div class="ai ${a.level==='danger'?'ai-r':a.level==='warning'?'ai-a':'ai-g'}">
        ${a.level==='danger'?'🚨':a.level==='warning'?'⚠️':'✅'}
      </div>
      <div>
        <div class="at">${a.message}</div>
        <div class="as">${new Date(a.time).toLocaleTimeString()}</div>
      </div>
    </div>
  `).join('');
}

function focus(id){
  const b = boats[id];
  if(b && boatMarkers[id]){map.setView([b.lat,b.lon],16);boatMarkers[id].openPopup();}
}

// ── Saa ──
setInterval(()=>{
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
},1000);

// ── WebSocket — unganika na seva ──
let ws, wsRetry = 0;
function connect(){
  ws = new WebSocket('location.protocol==='https:'?'wss://'+location.host:'ws://'+location.host);
  ws.onopen = ()=>{
    wsRetry = 0;
    document.getElementById('sdot').classList.add('ok');
    document.getElementById('slabel').textContent = 'Imeunganika';
  };
  ws.onmessage = e=>{
    try{
      const msg = JSON.parse(e.data);
      if(msg.type==='boat_update') updateBoat(msg.boat);
      if(msg.type==='alert') addAlert(msg);
      if(msg.type==='serial_status'){
        document.getElementById('sdot').classList.toggle('ok', msg.connected);
        document.getElementById('slabel').textContent = msg.connected
          ? 'COM15 imeunganika ✅'
          : 'Serial imekatika...';
      }
    }catch(e){}
  };
  ws.onclose = ()=>{
    document.getElementById('sdot').classList.remove('ok');
    document.getElementById('slabel').textContent = 'Inaunganika tena...';
    wsRetry = Math.min(wsRetry+1, 10);
    setTimeout(connect, wsRetry * 1000);
  };
  ws.onerror = ()=> ws.close();
}

// Pata data iliyopo tayari wakati wa kwanza
fetch('/api/boats').then(r=>r.json()).then(data=>data.forEach(updateBoat));
fetch('/api/alerts').then(r=>r.json()).then(data=>{
  data.reverse().forEach(addAlert);
});

connect();
</script>
</body>
</html>
